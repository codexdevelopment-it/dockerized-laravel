; =============================================================================
; PHP-FPM Pool Configuration
; =============================================================================

[global]
daemonize = no
error_log = /proc/self/fd/2

[www]
; Listen on TCP port (works better in container environments)
listen = 9000

; User/group
user = laravel
group = www-data

; Process manager
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 60s

; Error logging
php_admin_flag[log_errors] = on
catch_workers_output = yes
decorate_workers_output = no