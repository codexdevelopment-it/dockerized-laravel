; =============================================================================
; PHP-FPM Pool: www
; Listens on tcp/9000. Workers run as laravel:www-data.
; Mounted at /usr/local/etc/php-fpm.d/zz-docker.conf (overrides default www.conf).
; Note: [global] directives (daemonize, error_log) live in php-fpm.conf, not here.
; =============================================================================

[www]
listen = 9000

user = laravel
group = www-data

pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

request_terminate_timeout = 60s

php_admin_flag[log_errors] = on
catch_workers_output = yes
decorate_workers_output = no

access.log = /proc/self/fd/2
slowlog = /proc/self/fd/2
