; =============================================================================
; Supervisor Staging Configuration
; Similar to production but with debugging aids
; =============================================================================

[program:octane]
; Staging: moderate workers, JIT enabled
command=php -d opcache.enable_cli=1 -d opcache.jit=1254 /var/www/html/artisan octane:frankenphp --host=0.0.0.0 --port=8000 --workers=2 --max-requests=500
user=laravel
autostart=true
autorestart=true
priority=1
stopsignal=SIGTERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:queue-worker]
command=php /var/www/html/artisan queue:work --tries=3 --timeout=120 --max-jobs=500 --max-time=3600
process_name=%(program_name)s_%(process_num)02d
numprocs=1
user=laravel
autostart=true
autorestart=true
priority=2
stopsignal=SIGTERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:scheduler]
command=/bin/sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction; sleep 60; done"
user=laravel
autostart=true
autorestart=true
priority=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
