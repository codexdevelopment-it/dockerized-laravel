; =============================================================================
; Octane (FrankenPHP) server - local dev with --watch for hot reload.
; =============================================================================

[program:octane]
command=php -d opcache.enable_cli=1 /var/www/html/artisan octane:frankenphp --host=0.0.0.0 --port=8000 --workers=1 --max-requests=250 --watch
user=laravel
autostart=true
autorestart=true
priority=1
stopsignal=SIGTERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
