; =============================================================================
; Octane (FrankenPHP) server - staging.
; =============================================================================

[program:octane]
command=php -d opcache.enable_cli=1 -d opcache.jit=1254 /var/www/html/artisan octane:frankenphp --host=0.0.0.0 --port=8000 --workers=2 --max-requests=500
user=laravel
autostart=true
autorestart=true
priority=1
stopsignal=SIGTERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
