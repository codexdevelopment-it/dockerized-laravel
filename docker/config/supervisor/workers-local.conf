; =============================================================================
; Local dev workers: single queue worker, no scheduler (use ./dock artisan
; schedule:run by hand for testing).
; =============================================================================

[program:queue-worker]
command=php /var/www/html/artisan queue:work --tries=3 --timeout=60 --max-jobs=100 --max-time=1800
process_name=%(program_name)s_%(process_num)02d
numprocs=1
user=laravel
autostart=true
autorestart=true
priority=10
stopsignal=SIGTERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
