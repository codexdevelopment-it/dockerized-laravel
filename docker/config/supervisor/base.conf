; =============================================================================
; Supervisor Base Configuration
; Loads any *.conf file dropped into /etc/supervisor/programs/
; Compose mounts decide which programs run (server + workers).
; =============================================================================

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
loglevel=warn
user=root
minfds=1024

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[include]
files = /etc/supervisor/programs/*.conf
