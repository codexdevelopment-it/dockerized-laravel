# =============================================================================
# Nginx Reverse Proxy for Laravel + FrankenPHP/Octane
# Forwards all requests to the app container (Octane HTTP on port 8000).
# =============================================================================

upstream app_backend {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Max upload size
    client_max_body_size 100M;

    # Static assets cached aggressively (served directly from public/ via volume)
    root /var/www/html/public;

    # Try local static file first, then proxy to octane
    location / {
        try_files $uri @octane;
    }

    # Asset caching
    location ~* \.(css|js|gif|ico|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        try_files $uri @octane;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Proxy to octane
    location @octane {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    underscores_in_headers on;
}
