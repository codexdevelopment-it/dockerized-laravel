; =============================================================================
; PHP Staging Configuration
; Similar to production but with some debugging capability
; =============================================================================

[PHP]
; Hide errors from users but log everything
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL

; =============================================================================
; OPcache Staging Settings
; Balanced between performance and debuggability
; =============================================================================
[opcache]
; Enable timestamp validation so deployments are picked up
; (Staging may have frequent deployments)
opcache.validate_timestamps = 1

; Check less frequently than local (every 60 seconds)
opcache.revalidate_freq = 60

; =============================================================================
; JIT Staging Settings
; Enable JIT but keep debug info
; =============================================================================
[opcache_jit]
opcache.jit = 1254
opcache.jit_buffer_size = 32M
