; =============================================================================
; PHP Base Configuration
; Common settings for all environments (local, staging, production)
; =============================================================================

[PHP]
; Security
zend.exception_ignore_args = On
expose_php = Off

; Execution Limits
max_execution_time = 60
max_input_vars = 3000

; File Uploads
upload_max_filesize = 64M
post_max_size = 128M

; Memory
; 256M is plenty for most Laravel requests
memory_limit = 256M

; Error Handling (overridden per environment)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /dev/stderr

; Character Encoding
default_charset = UTF-8

; Date/Time (can be overridden via APP_TIMEZONE)
date.timezone = UTC

; =============================================================================
; OPcache Base Settings
; Environment-specific files override validate_timestamps and JIT settings
; =============================================================================
[opcache]
opcache.enable = 1
opcache.enable_cli = 1

; Memory allocation (128MB is enough for Laravel + Filament)
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16

; File handling
opcache.max_accelerated_files = 10000
opcache.save_comments = 1

; Revalidation frequency (0 = always check, good for development)
opcache.revalidate_freq = 0
