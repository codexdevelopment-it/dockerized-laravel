; =============================================================================
; PHP Production Configuration  
; Settings optimized for maximum performance
; =============================================================================

[PHP]
; Hide errors from users
display_errors = Off
display_startup_errors = Off

; Standard error reporting (no deprecation notices)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; =============================================================================
; OPcache Production Settings
; Maximum performance - no file checks
; =============================================================================
[opcache]
; CRITICAL: Disable timestamp validation for performance
; Files are only compiled once and cached permanently
; Requires container restart or opcache_reset() for code changes
opcache.validate_timestamps = 0

; Revalidation frequency irrelevant when validate_timestamps = 0
opcache.revalidate_freq = 0

; Enable preloading if configured (Laravel 9+)
; opcache.preload = /var/www/html/preload.php
; opcache.preload_user = laravel

; =============================================================================
; JIT Production Settings
; Maximum performance compilation
; =============================================================================
[opcache_jit]
; JIT compilation mode:
; 1255 = tracing JIT, optimized for long-running processes (Octane)
; 1254 = function JIT, good for traditional PHP-FPM
opcache.jit = 1255

; JIT buffer (32MB is plenty for most apps)
opcache.jit_buffer_size = 32M

; Debug logging off
opcache.jit_debug = 0

; =============================================================================
; Realpath Cache (important for production)
; =============================================================================
[realpath_cache]
realpath_cache_size = 4096K
realpath_cache_ttl = 600
