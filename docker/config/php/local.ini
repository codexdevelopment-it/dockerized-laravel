; =============================================================================
; PHP Local Development Configuration
; Settings optimized for development environment
; =============================================================================

[PHP]
; Show errors in development
display_errors = On
display_startup_errors = On

; More verbose error reporting
error_reporting = E_ALL

; Longer execution time for debugging
max_execution_time = 300

; =============================================================================
; OPcache Development Settings
; =============================================================================
[opcache]
; CRITICAL: Validate timestamps so changes are detected immediately
opcache.validate_timestamps = 1

; Check every 2 seconds (fast enough for development)
opcache.revalidate_freq = 2

; JIT disabled in local for faster code reloads
; JIT adds startup overhead and cached code conflicts with file changes
opcache.jit = off
opcache.jit_buffer_size = 0
