# =============================================================================
# Mailpit Service
# Email testing tool (catches all outgoing mail)
# =============================================================================

services:
  mailpit:
    container_name: '${CONTAINER_NAME}-mailpit'
    image: axllent/mailpit
    restart: '${RESTART_POLICY:-no}'
    ports:
      - '${MAILPIT_UI_PORT:-8025}:8025'   # Web UI
      - '${MAILPIT_SMTP_PORT:-1025}:1025' # SMTP
    environment:
      MP_MAX_MESSAGES: 100
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit-data:/data
    networks:
      - app-network

volumes:
  mailpit-data:
    driver: local
