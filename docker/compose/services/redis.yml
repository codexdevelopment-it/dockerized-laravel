# =============================================================================
# Redis Service
# In-memory data store for caching and queues
# =============================================================================

services:
  redis:
    container_name: '${CONTAINER_NAME}-redis'
    image: redis:7-alpine
    restart: '${RESTART_POLICY:-no}'
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
    driver: local
