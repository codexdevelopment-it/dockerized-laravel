# =============================================================================
# Soketi Service
# Open-source WebSocket server (Pusher-compatible)
# =============================================================================

services:
  soketi:
    container_name: '${CONTAINER_NAME}-soketi'
    image: 'quay.io/soketi/soketi:latest-16-alpine'
    restart: '${RESTART_POLICY:-no}'
    ports:
      - '${SOKETI_PORT:-6001}:6001'
    environment:
      - DEFAULT_APP_ID=${PUSHER_APP_ID:-app-id}
      - DEFAULT_APP_KEY=${PUSHER_APP_KEY:-app-key}
      - DEFAULT_APP_SECRET=${PUSHER_APP_SECRET:-app-secret}
    networks:
      - app-network
