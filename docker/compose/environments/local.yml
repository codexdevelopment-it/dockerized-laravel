# =============================================================================
# Local Development Environment
# Optimized for development workflow
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application - Local Development Overrides
  # ---------------------------------------------------------------------------
  app:
    volumes:
      # Mount entire project for live reload
      - '../../:/var/www/html'
      # Environment-specific PHP configuration
      - '../config/php/base.ini:/usr/local/etc/php/conf.d/00-base.ini:ro'
      - '../config/php/local.ini:/usr/local/etc/php/conf.d/01-environment.ini:ro'
      # Supervisor: base + per-env workers. Server program is mounted by the
      # server compose file (servers/*.yml).
      - '../config/supervisor/base.conf:/etc/supervisor/conf.d/00-base.conf:ro'
      - '../config/supervisor/workers-local.conf:/etc/supervisor/programs/10-workers.conf:ro'
    environment:
      - PHP_IDE_CONFIG=serverName=docker
      - XDEBUG_MODE=${XDEBUG_MODE:-off}

