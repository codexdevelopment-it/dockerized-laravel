# =============================================================================
# Staging Environment
# Production-like but with more debugging capability
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application - Staging Overrides
  # ---------------------------------------------------------------------------
  app:
    volumes:
      # Only mount storage directory (code is baked into image)
      - '${STORAGE_MOUNT_PATH:-./storage}:/var/www/html/storage'
      # Mount .env so credentials can change without rebuild
      - '../../.env:/var/www/html/.env:ro'
      # Environment-specific PHP configuration
      - '../config/php/base.ini:/usr/local/etc/php/conf.d/00-base.ini:ro'
      - '../config/php/staging.ini:/usr/local/etc/php/conf.d/01-environment.ini:ro'
      # Supervisor: base + per-env workers. Server program is mounted by the
      # server compose file (servers/*.yml).
      - '../config/supervisor/base.conf:/etc/supervisor/conf.d/00-base.conf:ro'
      - '../config/supervisor/workers-staging.conf:/etc/supervisor/programs/10-workers.conf:ro'

  # ---------------------------------------------------------------------------
  # Database - Staging Overrides
  # ---------------------------------------------------------------------------
  mariadb:
    # Expose port for debugging if needed
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - '${DB_MOUNT_PATH:-./db-data}:/var/lib/mysql'
