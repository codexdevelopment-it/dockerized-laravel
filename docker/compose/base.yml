# =============================================================================
# Base Docker Compose Configuration
# Common service definitions shared by all environments
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application Container
  # ---------------------------------------------------------------------------
  app:
    container_name: '${CONTAINER_NAME}'
    build:
      context: ../../
      dockerfile: docker/Dockerfile
      args:
        - BUILD_ENV=${APP_ENV:-local}
        - USER_ID=${USER_ID:-1000}
        - GROUP_ID=${GROUP_ID:-1000}
    image: '${CONTAINER_NAME}:${APP_ENV:-local}'
    restart: '${RESTART_POLICY:-no}'
    working_dir: '/var/www/html'
    environment:
      - APP_ENV=${APP_ENV:-local}
      - CONTAINER_NAME=${CONTAINER_NAME}
      - TZ=${APP_TIMEZONE:-Europe/Rome}
    volumes:
      # FPM pool configuration
      - '../config/fpm/pool.conf:/usr/local/etc/php-fpm.d/zz-docker.conf:ro'
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'php', '-v']
      interval: 30s
      timeout: 10s
      retries: 3

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    driver: bridge
