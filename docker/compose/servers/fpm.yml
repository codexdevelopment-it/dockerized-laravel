# =============================================================================
# PHP-FPM standalone
# Runs php-fpm on port 9000 inside the app container. No web server in front.
# You'll need to add your own (nginx/caddy on the host, or use SERVER=nginx
# / SERVER=caddy to get them as docker services).
# =============================================================================

services:
  app:
    # Expose FPM port if user wants to point an external nginx/caddy at it
    ports:
      - '${APP_PORT:-9000}:9000'
    volumes:
      - '../config/supervisor/server-fpm.conf:/etc/supervisor/programs/20-server.conf:ro'
