# =============================================================================
# Caddy Server
# Modern web server with automatic HTTPS
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Caddy Web Server / Reverse Proxy
  # ---------------------------------------------------------------------------
  caddy:
    container_name: '${CONTAINER_NAME}-caddy'
    image: caddy:alpine
    restart: '${RESTART_POLICY:-no}'
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - '../config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro'
      - '../../:/var/www/html'
      - '${STORAGE_MOUNT_PATH:-../../storage}:/var/www/html/storage'
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - app-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
