# =============================================================================
# Caddy + PHP-FPM
# Caddy fronts php-fpm on app:9000 via php_fastcgi. Auto-HTTPS via DOMAIN env.
# =============================================================================

services:
  app:
    volumes:
      - '../config/supervisor/server-fpm.conf:/etc/supervisor/programs/20-server.conf:ro'

  caddy:
    container_name: '${CONTAINER_NAME}-caddy'
    image: caddy:alpine
    restart: '${RESTART_POLICY:-no}'
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - '../config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro'
      - '../../:/var/www/html:ro'
      - '${STORAGE_MOUNT_PATH:-../../storage}:/var/www/html/storage:ro'
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - app-network

volumes:
  caddy-data:
    driver: local
  caddy-config:
    driver: local
