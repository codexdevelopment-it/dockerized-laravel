[PHP]
zend.exception_ignore_args = On
expose_php = Off
max_execution_time = 60
max_input_vars = 3000
upload_max_filesize = 64M
post_max_size = 128M
; On 1GB RAM, 512M per process is too much risk.
; 256M is plenty for most Laravel requests.
memory_limit = 256M

error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

default_charset = UTF-8

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
; 128MB is enough for a standard Laravel + Filament app.
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.save_comments = 1

[opcache_jit]
opcache.jit = 1254
; 100MB is huge for a small server. 32MB or 64MB is plenty.
opcache.jit_buffer_size = 32M

;[opentelemetry]
;opentelemetry.enabled = 1
;opentelemetry.log_level = warn
;; Batch size 512 is good, keeps memory spikes low.
;opentelemetry.exporter_otlp_span_batch_size = 512
