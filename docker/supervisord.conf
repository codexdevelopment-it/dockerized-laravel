[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
loglevel=warn
user=root
# CRITICAL FOR HIGH CONCURRENCY:
# Default is 1024. With 700 users + DB connections, you might hit the limit.
minfds=10000

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:octane]
command=php -d opcache.enable_cli=1 -d opcache.jit=1255 /var/www/html/artisan octane:frankenphp --host=0.0.0.0 --port=8000 --workers=auto --task-workers=auto --max-requests=500 --max-time=3600
user=appuser
autostart=true
autorestart=true
priority=1
stopsignal=SIGTERM
stopwaitsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# --- QUEUE: BACKGROUND PRIORITY ---
[program:queue-worker]
command=php /var/www/html/artisan queue:work --tries=3 --timeout=120 --max-jobs=500 --max-time=3600
process_name=%(program_name)s_%(process_num)02d
numprocs=1
user=appuser
autostart=true
autorestart=true
priority=2
stopsignal=SIGTERM
stopwaitsecs=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0