[PHP]
; --- YOUR EXISTING SECURITY & PERF ---
zend.exception_ignore_args = On
expose_php = Off
max_execution_time = 60
max_input_vars = 3000
upload_max_filesize = 64M
post_max_size = 128M
memory_limit = 512M

error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

default_charset = UTF-8

session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1

[Date]
date.timezone = UTC

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1

; --- JIT TUNING ---
; 1254 is stable, but for OTel instrumentation,
; ensuring the JIT doesn't "over-optimize" away the hooks OTel needs is key.
opcache.jit = 1254
opcache.jit_buffer_size = 100M

[Assertion]
zend.assertions = -1

; --- ADDED: OPENTELEMETRY OPTIMIZATIONS ---
[opentelemetry]
; The C extension only hooks into functions (cheap). Export is handled by
; the PHP SDK, controlled via OTEL_* env vars and timeout settings.
opentelemetry.enabled = 1

; CRITICAL for 1,000 user stress test:
; Setting this to 'info' or 'debug' will flood your K8s logs
; and kill your disk I/O. Keep it at 'warn'.
opentelemetry.log_level = warn

; This tells the extension to use the batching memory limit
; to prevent the worker from ballooning in RAM.
opentelemetry.exporter_otlp_span_batch_size = 512